// ===================== QUIZ =====================
const QUIZ_STATE_KEY = 'sani.quiz.state';
const QUIZ_BEST_KEY = 'sani.quiz.best';
const QUIZ_BLOCK_SIZE = 10;
let quizQuestions = [], currentQuestion = 0, quizScore = 0, quizAnswered = false, quizCategory = 'alle';

function saveQuizState() {
    if (!quizQuestions.length) return;
    try { localStorage.setItem(QUIZ_STATE_KEY, JSON.stringify({ category: quizCategory, questions: quizQuestions, currentQuestion, quizScore })); } catch (e) {}
}
function loadQuizState() {
    try { const raw = localStorage.getItem(QUIZ_STATE_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
}
function clearQuizState() { try { localStorage.removeItem(QUIZ_STATE_KEY); } catch (e) {} }
function getQuizBest() { try { const raw = localStorage.getItem(QUIZ_BEST_KEY); return raw ? JSON.parse(raw) : {}; } catch (e) { return {}; } }
function updateQuizBest(cat, pct, score, total) {
    try {
        const data = getQuizBest();
        const prev = data[cat];
        if (!prev || pct > prev.pct) {
            data[cat] = { pct, score, total, date: Date.now() };
            localStorage.setItem(QUIZ_BEST_KEY, JSON.stringify(data));
        }
    } catch (e) {}
}

function shuffleArr(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

function pickWrong(pool, correct, count) {
    const wrong = shuffleArr(pool.filter(x => x !== correct));
    return wrong.slice(0, Math.min(count, wrong.length));
}

function buildQuizQuestions(category) {
    const qs = [];

    if (category === 'xabcde' || category === 'alle') {
        xabcdeData.forEach(g => {
            if (!g.badge) return;
            const otherStepItems = xabcdeData.filter(x => x.badge && x.badge !== g.badge).flatMap(x => x.items.map(i => i.name));
            g.items.forEach(item => {
                const w = pickWrong(otherStepItems, item.name, 3);
                if (w.length > 0) qs.push({ cat: 'xabcde', question: `Welcher Prüfpunkt gehört zu <strong>${g.step}</strong>?`, correct: item.name, options: shuffleArr([item.name, ...w]), detail: item.detail });
            });
        });
        xabcdeData.forEach(g => {
            if (!g.badge) return;
            const otherSteps = xabcdeData.filter(x => x.badge && x.badge !== g.badge).map(x => x.step);
            g.items.forEach(item => {
                const w = shuffleArr(otherSteps).slice(0, 3);
                if (w.length > 0) qs.push({ cat: 'xabcde', question: `Zu welchem Schritt gehört <strong>${item.name}</strong>?`, correct: g.step, options: shuffleArr([g.step, ...w]), detail: item.detail });
            });
        });
    }

    if (category === 'sample' || category === 'alle') {
        sampleData.forEach(s => {
            const w = pickWrong(sampleData.map(x => x.name), s.name, 3);
            if (w.length > 0) qs.push({ cat: 'sample', question: `Wofür steht <strong>${s.letter}</strong> in SAMPLE?`, correct: s.name, options: shuffleArr([s.name, ...w]), detail: s.detail });
        });
    }

    if (category === 'notfaelle' || category === 'alle') {
        const allC = notfallbilder.flatMap(c => c.conditions);
        if (allC.length >= 2) {
            allC.forEach(c => {
                const w = pickWrong(allC.map(x => x.name), c.name, 3);
                if (w.length > 0) qs.push({ cat: 'notfaelle', question: `Welches Notfallbild passt?\n\n<em>${c.symptoms}</em>`, correct: c.name, options: shuffleArr([c.name, ...w]), detail: 'Maßnahmen: ' + c.action });
            });
        }
    }

    if ((category === 'leitsymptome' || category === 'alle') && leitsymptomeData && leitsymptomeData.length >= 2) {
        leitsymptomeData.forEach(ls => {
            ls.ursachen.forEach(u => {
                const otherCauses = leitsymptomeData.flatMap(o => o.ursachen.map(x => x.name)).filter(n => n !== u.name);
                const w = pickWrong([...new Set(otherCauses)], u.name, 3);
                if (w.length >= 2) qs.push({ cat: 'leitsymptome', question: `Leitsymptom <strong>${ls.name}</strong> — welche Ursache passt zu folgendem Befund?\n\n<em>${u.hint}</em>`, correct: u.name, options: shuffleArr([u.name, ...w]), detail: `Aus dem Notfallbild: ${u.ref || u.name}` });
            });
        });
        leitsymptomeData.forEach(ls => {
            const otherSyms = leitsymptomeData.filter(l => l.name !== ls.name).map(l => l.name);
            ls.ursachen.slice(0, 2).forEach(u => {
                const w = shuffleArr(otherSyms).slice(0, 3);
                if (w.length >= 2) qs.push({ cat: 'leitsymptome', question: `Bei welchem Leitsymptom kommt <strong>${u.name}</strong> als mögliche Ursache in Frage?\n\n<em>${u.hint}</em>`, correct: ls.name, options: shuffleArr([ls.name, ...w]), detail: `Auch andere Leitsymptome können passen — hier ist es ${ls.name}.` });
            });
        });
    }

    if ((category === 'vitalwerte' || category === 'alle') && normalwerteData && normalwerteData.length >= 2) {
        normalwerteData.forEach(v => {
            const w = pickWrong(normalwerteData.map(x => x.normal), v.normal, 3);
            if (w.length > 0) qs.push({ cat: 'vitalwerte', question: `Was ist der Normalwert für <strong>${v.name}</strong>?`, correct: v.normal, options: shuffleArr([v.normal, ...w]), detail: v.hinweis || '' });
        });
    }

    if ((category === 'reanimation' || category === 'alle') && reanimationData && reanimationData.length >= 2) {
        reanimationData.forEach(g => {
            const otherStepItems = reanimationData.filter(x => x.step !== g.step).flatMap(x => x.items.map(i => i.name));
            g.items.forEach(item => {
                const w = pickWrong(otherStepItems, item.name, 3);
                if (w.length > 0) qs.push({ cat: 'reanimation', question: `Welcher Punkt gehört zu <strong>${g.step}</strong>?`, correct: item.name, options: shuffleArr([item.name, ...w]), detail: item.detail });
            });
        });
        reanimationData.forEach(g => {
            const otherSteps = reanimationData.filter(x => x.step !== g.step).map(x => x.step);
            g.items.forEach(item => {
                const w = shuffleArr(otherSteps).slice(0, 3);
                if (w.length > 0) qs.push({ cat: 'reanimation', question: `Zu welcher Phase gehört <strong>${item.name}</strong>?`, correct: g.step, options: shuffleArr([g.step, ...w]), detail: item.detail });
            });
        });
        const reaniFacts = [
            { question: 'Wie tief wird beim Erwachsenen gedrückt?', correct: '5–6 cm', options: ['3–4 cm', '5–6 cm', '7–8 cm', 'so tief wie möglich'], detail: 'Mindestens 5 cm, höchstens 6 cm — auf harter Unterlage.' },
            { question: 'Welche Kompressionsfrequenz ist beim Erwachsenen korrekt?', correct: '100–120/min', options: ['60–80/min', '80–100/min', '100–120/min', '140–160/min'], detail: 'Merkhilfe: Takt von "Stayin\' Alive" (Bee Gees).' },
            { question: 'Welches Kompressions-/Beatmungsverhältnis gilt für Erwachsene?', correct: '30:2', options: ['15:2', '30:2', '5:1', '15:1'], detail: '30 Kompressionen, dann 2 Beatmungen — unabhängig ob Laie oder Profi.' },
            { question: 'Wie lange darf die Atemkontrolle maximal dauern?', correct: 'max. 10 Sekunden', options: ['max. 5 Sekunden', 'max. 10 Sekunden', 'max. 30 Sekunden', 'max. 60 Sekunden'], detail: 'Sehen, Hören, Fühlen — insgesamt nicht länger als 10 Sekunden.' },
            { question: 'Wie oft sollten die Helfer bei der Thoraxkompression wechseln?', correct: 'alle ca. 2 Minuten', options: ['alle 30 Sekunden', 'alle ca. 2 Minuten', 'alle 5 Minuten', 'nur bei Erschöpfung'], detail: 'Qualität der Kompression sinkt nach 1–2 Minuten unbemerkt — Wechsel unter 5 Sekunden.' },
            { question: 'Wo sitzt der Druckpunkt bei der HLW?', correct: 'Mitte Brustkorb, untere Hälfte Sternum', options: ['Über dem Herzen links', 'Mitte Brustkorb, untere Hälfte Sternum', 'Oberes Drittel Sternum', 'Unterhalb des Rippenbogens'], detail: 'Handballen auf der unteren Sternumhälfte, zweite Hand darüber, Arme gestreckt.' },
            { question: 'Was ist Schnappatmung?', correct: 'Keine normale Atmung — sofort Reanimation', options: ['Eine normale Atemform', 'Keine normale Atmung — sofort Reanimation', 'Erstes Zeichen der Erholung', 'Nur relevant bei Kindern'], detail: 'Agonale Atmung zählt nicht als normale Atmung. Bewusstlos + Schnappatmung = Reanimation starten.' },
            { question: 'Was gilt beim AED während der Rhythmusanalyse?', correct: 'Niemand berührt den Patienten', options: ['HLW fortsetzen', 'Puls tasten', 'Niemand berührt den Patienten', 'Patient beatmen'], detail: 'Laut "Weg vom Patienten!" rufen — während Analyse und Schockabgabe keine Berührung.' },
            { question: 'Was tun unmittelbar nach einem AED-Schock?', correct: 'Sofort weiter mit 30:2', options: ['Puls tasten', 'Atmung kontrollieren', 'Sofort weiter mit 30:2', '2 Minuten warten'], detail: 'Keine Puls-/Atemkontrolle — direkt weiter mit Thoraxkompression.' },
            { question: 'Wie ist das Verhältnis bei Kindern (Laienhelfer)?', correct: '30:2 wie beim Erwachsenen', options: ['15:2', '30:2 wie beim Erwachsenen', '5:1', '10:2'], detail: 'Profi/Geschult: 5 initiale Beatmungen, dann 15:2. Laien: 30:2.' },
            { question: 'Drucktiefe beim Säugling (<1 Jahr)?', correct: 'ca. 4 cm (1/3 Thorax)', options: ['ca. 2 cm', 'ca. 4 cm (1/3 Thorax)', '5–6 cm wie Erwachsener', 'so tief wie möglich'], detail: 'Zwei-Finger- oder Zwei-Daumen-Technik, Kopf nur neutral, nicht überstrecken.' },
            { question: 'Wann wird die Reanimation abgebrochen?', correct: 'Rettungsdienst übernimmt oder Patient erwacht', options: ['Nach 10 Minuten erfolglos', 'Rettungsdienst übernimmt oder Patient erwacht', 'Nach 3 AED-Schocks', 'Wenn keine Besserung sichtbar'], detail: 'Weiter bis: Übernahme RD, Lebenszeichen, Erschöpfung ohne Ersatz oder sichere Todeszeichen.' },
            { question: 'Welche Nummer wird in Deutschland für den Notruf gewählt?', correct: '112', options: ['110', '112', '113', '911'], detail: '112 ist der europaweite Notruf für Rettungsdienst und Feuerwehr.' },
            { question: 'Was ist ROSC?', correct: 'Wiedereinsetzender Spontankreislauf', options: ['Schocktyp', 'Wiedereinsetzender Spontankreislauf', 'Reanimations-Medikament', 'AED-Herstellername'], detail: 'Return of Spontaneous Circulation — danach stabile Seitenlage bei normaler Atmung, engmaschig kontrollieren.' },
            { question: 'Wie werden die AED-Elektroden beim Erwachsenen platziert?', correct: 'Rechts unterhalb Schlüsselbein + links unterhalb Achsel', options: ['Beide über dem Herzen', 'Rechts unterhalb Schlüsselbein + links unterhalb Achsel', 'Rechts und links auf dem Rücken', 'Oben und unten am Brustbein'], detail: 'Anterior-laterale Position — gemäß Aufdruck auf den Elektroden.' }
        ];
        reaniFacts.forEach(f => qs.push({ ...f, cat: 'reanimation', options: shuffleArr([...f.options]) }));
    }

    return shuffleArr(qs).slice(0, QUIZ_BLOCK_SIZE);
}

const QUIZ_CATS = [
    { id: 'alle', title: 'Alles gemischt', desc: 'Alle Bereiche zusammen' },
    { id: 'xabcde', title: 'xABCDE', desc: 'Prüfpunkte & Zuordnung' },
    { id: 'sample', title: 'SAMPLE', desc: 'Anamnese-Buchstaben' },
    { id: 'reanimation', title: 'Reanimation', desc: 'BLS-Algorithmus & AED' },
    { id: 'notfaelle', title: 'Notfallbilder', desc: 'Symptome → Krankheitsbild' },
    { id: 'leitsymptome', title: 'Leitsymptome', desc: 'Leitsymptom → mögliche Ursache' },
    { id: 'vitalwerte', title: 'Vitalwerte', desc: 'Vitalparameter & Grenzwerte' }
];

const QUIZ_CAT_TO_WISSEN = {
    xabcde: 'xabcde',
    sample: 'sample',
    reanimation: 'reanimation',
    notfaelle: 'notfaelle',
    leitsymptome: 'leitsymptome',
    vitalwerte: 'vitalwerte'
};

function quizCatTitle(id) { const c = QUIZ_CATS.find(c => c.id === id); return c ? c.title : id; }

function quizStatus(id, best) {
    const b = (best || getQuizBest())[id];
    if (!b) return { key: 'none', label: 'noch offen', pct: null };
    if (b.pct >= 80) return { key: 'good', label: 'stark', pct: b.pct };
    if (b.pct >= 50) return { key: 'ok', label: 'solide', pct: b.pct };
    return { key: 'weak', label: 'Übungsbedarf', pct: b.pct };
}

function showQuizMenu() {
    document.getElementById('quiz-active').classList.add('d-none');
    const menu = document.getElementById('quiz-menu');
    menu.classList.remove('d-none');
    setHeroTitle('Quiz', 'ueben-hero-title');
    const best = getQuizBest();
    const saved = loadQuizState();

    const tested = QUIZ_CATS.filter(c => best[c.id]);
    const weakCats = tested.filter(c => quizStatus(c.id, best).key === 'weak');
    const okCats = tested.filter(c => quizStatus(c.id, best).key === 'ok');
    const goodCats = tested.filter(c => quizStatus(c.id, best).key === 'good');

    const chipLink = (c, klass) => `<button class="quiz-chip ${klass}" onclick="startQuizCategory('${c.id}')" title="${c.title} jetzt üben">${c.title}</button>`;

    let summary = '';
    if (tested.length > 0) {
        const chips = [
            ...weakCats.map(c => chipLink(c, 'quiz-chip-weak')),
            ...okCats.map(c => chipLink(c, 'quiz-chip-ok')),
            ...goodCats.map(c => chipLink(c, 'quiz-chip-good'))
        ];
        const headLabel = weakCats.length ? 'Übungsbedarf' : (okCats.length ? 'Bereiche' : 'Stark');
        summary = `
            <div class="quiz-summary">
                <div class="quiz-summary-title">Deine Auswertung · ${headLabel} zuerst — tippen zum Üben</div>
                <div class="quiz-summary-chips">${chips.join('')}</div>
                ${weakCats.length ? `<p class="quiz-summary-hint">Fokus: ${weakCats.map(c => c.title).join(', ')}</p>` : (tested.length === QUIZ_CATS.length - 1 && !weakCats.length && !okCats.length ? `<p class="quiz-summary-hint">Alles im grünen Bereich.</p>` : '')}
            </div>
        `;
    }

    const resumeBtn = saved && saved.questions && saved.currentQuestion < saved.questions.length ? `
        <button class="btn btn-danger quiz-card" onclick="resumeQuiz()">
            <div class="quiz-card-main">
                <strong>Fortsetzen</strong>
                <small>Frage ${saved.currentQuestion + 1} / ${saved.questions.length} · ${quizCatTitle(saved.category)}</small>
            </div>
        </button>
    ` : '';

    const order = { weak: 0, ok: 1, none: 2, good: 3 };
    const sortedCats = [...QUIZ_CATS].sort((a, b) => {
        if (a.id === 'alle') return -1;
        if (b.id === 'alle') return 1;
        return order[quizStatus(a.id, best).key] - order[quizStatus(b.id, best).key];
    });

    const catBtn = (c) => {
        const s = quizStatus(c.id, best);
        const badge = s.pct !== null
            ? `<span class="quiz-best quiz-status-${s.key}">${s.pct}% · ${s.label}</span>`
            : `<span class="quiz-best quiz-status-none">${s.label}</span>`;
        return `
            <button class="btn btn-outline-danger quiz-card" onclick="startQuizCategory('${c.id}')">
                <div class="quiz-card-main">
                    <strong>${c.title}</strong>
                    <small>${c.desc}</small>
                </div>
                ${badge}
            </button>
        `;
    };

    menu.innerHTML = `
        <h5 class="mb-2">Quiz — Bereich wählen</h5>
        <p class="small text-muted mb-3">10 Fragen pro Durchgang · Stand wird automatisch gespeichert</p>
        ${summary}
        <div class="d-grid gap-2 mt-3">
            ${resumeBtn}
            ${sortedCats.map(catBtn).join('')}
        </div>
    `;
}

async function startQuizCategory(cat) {
    const needs = [];
    if (cat === 'xabcde' || cat === 'alle') needs.push('xabcde');
    if (cat === 'sample' || cat === 'alle') needs.push('sample');
    if (cat === 'notfaelle' || cat === 'alle') needs.push('notfallbilder');
    if (cat === 'leitsymptome' || cat === 'alle') needs.push('leitsymptome', 'notfallbilder');
    if (cat === 'vitalwerte' || cat === 'alle') needs.push('normalwerte');
    if (cat === 'reanimation' || cat === 'alle') needs.push('reanimation');
    const toLoad = [...new Set(needs)].filter(n => !DATA_CACHE[n]);
    if (toLoad.length) {
        document.getElementById('quiz-menu').innerHTML = '<div class="loading-placeholder"></div><div class="loading-placeholder"></div>';
        await Promise.all(toLoad.map(n => loadData(n)));
    }
    quizCategory = cat;
    quizQuestions = buildQuizQuestions(cat);
    currentQuestion = 0; quizScore = 0; quizAnswered = false;
    clearQuizState();
    saveQuizState();
    document.getElementById('quiz-menu').classList.add('d-none');
    document.getElementById('quiz-active').classList.remove('d-none');
    setHeroTitle(quizCatTitle(cat), 'ueben-hero-title');
    renderQuiz();
}

function resumeQuiz() {
    const s = loadQuizState();
    if (!s || !s.questions || !s.questions.length) return;
    quizCategory = s.category;
    quizQuestions = s.questions;
    currentQuestion = s.currentQuestion || 0;
    quizScore = s.quizScore || 0;
    quizAnswered = false;
    document.getElementById('quiz-menu').classList.add('d-none');
    document.getElementById('quiz-active').classList.remove('d-none');
    setHeroTitle(quizCatTitle(quizCategory), 'ueben-hero-title');
    renderQuiz();
}

function renderQuiz() {
    const area = document.getElementById('quiz-area');
    const total = quizQuestions.length;

    if (currentQuestion >= total) {
        clearQuizState();
        const pct = total > 0 ? Math.round((quizScore / total) * 100) : 0;
        if (total > 0) updateQuizBest(quizCategory, pct, quizScore, total);
        const sc = pct >= 80 ? 'train-score-good' : pct >= 50 ? 'train-score-ok' : 'train-score-bad';
        area.innerHTML = `
            <div class="card shadow-sm"><div class="card-body text-center p-3">
                <h5>Quiz beendet!</h5>
                <p class="display-5 fw-bold ${sc}">${pct}%</p>
                <p class="text-muted small">${quizScore} von ${total} richtig</p>
                <div class="d-flex justify-content-center gap-2 mt-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="showQuizMenu()">Andere Kategorie</button>
                    <button class="btn btn-danger btn-sm" onclick="startQuizCategory('${quizCategory}')">Nochmal</button>
                </div>
            </div></div>`;
        document.getElementById('quiz-label').textContent = 'Ergebnis';
        document.getElementById('quiz-progress').style.width = '100%';
        return;
    }

    const q = quizQuestions[currentQuestion];
    document.getElementById('quiz-label').textContent = `Frage ${currentQuestion + 1} / ${total}`;
    document.getElementById('quiz-progress').style.width = `${(currentQuestion / total) * 100}%`;

    area.innerHTML = `
        <div class="card shadow-sm"><div class="card-body p-3">
            <p class="small mb-3">${q.question}</p>
            <div class="d-grid gap-2">
                ${q.options.map((o, i) => `<button class="btn btn-outline-secondary text-start quiz-option py-2 px-3" id="opt-${i}" onclick="answerQuiz(${i})">${o}</button>`).join('')}
            </div>
            <div id="quiz-feedback" class="mt-3 d-none"></div>
            <div id="quiz-next" class="mt-3 d-none text-end">
                <button class="btn btn-danger btn-sm" onclick="nextQuestion()">Weiter</button>
            </div>
        </div></div>`;
}

function answerQuiz(i) {
    if (quizAnswered) return; quizAnswered = true;
    const q = quizQuestions[currentQuestion], ok = q.options[i] === q.correct;
    if (ok) quizScore++;
    q.options.forEach((o, j) => {
        const el = document.getElementById(`opt-${j}`);
        if (o === q.correct) el.classList.add('quiz-correct');
        if (j === i && !ok) el.classList.add('quiz-wrong');
        el.disabled = true;
    });
    const fb = document.getElementById('quiz-feedback'); fb.classList.remove('d-none');
    let html = ok ? '<span class="text-success fw-bold small">Richtig!</span>' : `<span class="text-danger fw-bold small">Falsch.</span> <span class="text-muted small">Richtig: ${q.correct}</span>`;
    if (q.detail) html += `<p class="text-muted small mt-2 mb-0">${q.detail}</p>`;
    if (!ok && q.cat && QUIZ_CAT_TO_WISSEN[q.cat]) {
        const wissenSec = QUIZ_CAT_TO_WISSEN[q.cat];
        const label = quizCatTitle(q.cat);
        html += `<div><button type="button" class="theory-link" onclick="jumpToTheory('${wissenSec}')">Theorie öffnen: ${label}</button></div>`;
    }
    fb.innerHTML = html;
    document.getElementById('quiz-next').classList.remove('d-none');
    saveQuizState();
}

function jumpToTheory(section) {
    const wissenTab = document.getElementById('tab-wissen');
    if (wissenTab) {
        const tab = bootstrap.Tab.getOrCreateInstance(wissenTab);
        tab.show();
    }
    const subBtn = document.querySelector(`#wissen .sub-pill[data-section="${section}"]`);
    if (subBtn) showWissenSection(section, subBtn);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextQuestion() { currentQuestion++; quizAnswered = false; saveQuizState(); renderQuiz(); }

// ===================== NORMALWERTE =====================
function renderValues() {
    const c = document.getElementById('values-content');
    if (!normalwerteData || !normalwerteData.length) {
        c.innerHTML = '<p class="text-muted">Keine Normalwerte vorhanden.</p>';
        return;
    }
    c.innerHTML = `
        <h5 class="mb-3">Normalwerte &amp; Grenzwerte</h5>
        ${normalwerteData.map(v => `
            <div class="card mb-3 shadow-sm">
                <div class="card-body p-3">
                    <h6 class="fw-bold mb-2">${v.name}</h6>
                    <table class="table table-sm table-borderless mb-1" style="font-size:.85rem">
                        <tr>
                            <td class="text-success fw-bold" style="width:30%">Normal</td>
                            <td>${v.normal}</td>
                        </tr>
                        ${v.niedrig ? `<tr>
                            <td class="text-primary fw-bold">Zu niedrig</td>
                            <td>${v.niedrig.replace(/\n/g, '<br>')}</td>
                        </tr>` : ''}
                        ${v.hoch ? `<tr>
                            <td class="text-danger fw-bold">Zu hoch</td>
                            <td>${v.hoch.replace(/\n/g, '<br>')}</td>
                        </tr>` : ''}
                    </table>
                    ${v.hinweis ? `<p class="text-muted small mb-0"><strong>Hinweis:</strong> ${v.hinweis}</p>` : ''}
                </div>
            </div>
        `).join('')}
    `;
}

// ===================== ABLAUF =====================
const UEB_XABCDE = ['x', 'A', 'B', 'C', 'D', 'E'];
function renderUebRows(blocks, values) {
    const rows = [];
    let group = [];
    const flushGroup = () => {
        if (!group.length) return;
        rows.push(`
            <div class="ueb-row ueb-row-plain">
                <span class="ueb-row-key">${group.join(' + ')}</span>
                <span class="ueb-row-text">unauffällig</span>
            </div>
        `);
        group = [];
    };
    for (const blk of blocks) {
        const v = values[blk.key];
        if (!v) continue;
        const isLetter = UEB_XABCDE.includes(blk.key);
        const plain = String(v).trim().toLowerCase() === 'unauffällig';
        if (isLetter && plain) {
            group.push(blk.key);
            continue;
        }
        flushGroup();
        rows.push(`
            <div class="ueb-row">
                <span class="ueb-row-key">${blk.title}</span>
                <span class="ueb-row-text">${nbEnrich(v)}</span>
            </div>
        `);
    }
    flushGroup();
    return rows.join('');
}

const openUebCats = new Set();
function toggleUebCat(idx, btn) {
    const wasOpen = openUebCats.has(idx);
    openUebCats.clear();
    document.querySelectorAll('#uebergabe-content .accordion-head.open, #uebergabe-content .accordion-body.open')
        .forEach(el => el.classList.remove('open'));
    if (!wasOpen) {
        openUebCats.add(idx);
        btn.classList.add('open');
        btn.nextElementSibling.classList.add('open');
    }
}

function renderUebergabe() {
    const c = document.getElementById('uebergabe-content');
    if (!uebergabeData || !uebergabeData.beispiele) {
        c.innerHTML = '<p class="text-muted small">Keine Übergabe-Beispiele verfügbar.</p>';
        return;
    }
    const schema = uebergabeData.schema || { blocks: [] };
    c.innerHTML = `
        <div class="ueb-schema">
            <span class="ueb-schema-head">${schema.name || 'Übergabe-Schema'}</span>
            <p class="ueb-schema-intro">${schema.intro || ''}</p>
            <ul class="ueb-schema-list">
                ${(schema.blocks || []).map(b => `
                    <li><span class="ueb-block-key">${b.title}</span> <span class="ueb-block-hint">${b.hint}</span></li>
                `).join('')}
            </ul>
        </div>
        ${uebergabeData.beispiele.map((b, i) => `
            <div class="accordion-cat">
                <button class="accordion-head ${openUebCats.has(i) ? 'open' : ''}" onclick="toggleUebCat(${i}, this)">
                    <span class="accordion-title">${b.title}</span>
                    <span class="accordion-chevron">›</span>
                </button>
                <div class="accordion-body ${openUebCats.has(i) ? 'open' : ''}">
                    <div class="accordion-body-inner">
                        <p class="ueb-situation"><em>${b.situation}</em></p>
                        ${renderUebRows(schema.blocks || [], b.blocks || {})}
                        ${b.hinweis ? `<div class="ueb-hint"><span class="nb-cave">Hinweis:</span> ${b.hinweis}</div>` : ''}
                    </div>
                </div>
            </div>
        `).join('')}
    `;
}

// ===================== SZENARIO =====================
let szenarien = [], szenarioCurrent = 0, szenarioStep = 0, szenarioScore = 0, szenarioAnswered = false;
const SZENARIO_STATE_KEY = 'sani.szenario.state';

function saveSzenarioState() {
    try {
        const sz = szenarien[szenarioCurrent];
        if (!sz) return;
        const total = sz.schritte.length;
        if (szenarioStep >= total) { clearSzenarioState(); return; }
        localStorage.setItem(SZENARIO_STATE_KEY, JSON.stringify({
            current: szenarioCurrent, step: szenarioStep, score: szenarioScore, title: sz.title, total
        }));
    } catch (e) {}
}
function loadSzenarioState() { try { const r = localStorage.getItem(SZENARIO_STATE_KEY); return r ? JSON.parse(r) : null; } catch (e) { return null; } }
function clearSzenarioState() { try { localStorage.removeItem(SZENARIO_STATE_KEY); } catch (e) {} }

function resumeSzenario() {
    const s = loadSzenarioState();
    if (!s || typeof s.current !== 'number' || !szenarien[s.current]) return;
    szenarioCurrent = s.current;
    szenarioStep = s.step || 0;
    szenarioScore = s.score || 0;
    szenarioAnswered = false;
    setHeroTitle(szenarien[szenarioCurrent].title, 'ueben-hero-title');
    renderSzenario();
}

const SZENARIO_TAGS = {
    bewusstsein: 'Bewusstsein',
    atmung: 'Atmung',
    kreislauf: 'Kreislauf',
    trauma: 'Trauma',
    neurologisch: 'Neuro',
    stoffwechsel: 'Stoffwechsel',
    intoxikation: 'Intox',
    hitze: 'Hitze',
    'kälte': 'Kälte'
};
const SZENARIO_DIFFICULTY = { easy: 'leicht', medium: 'mittel', hard: 'schwer' };
let szenarioFilterTag = 'all';

function startSzenarioMenu() {
    setHeroTitle('Szenario', 'ueben-hero-title');
    const area = document.getElementById('szenario-area');
    if (!szenarien || !szenarien.length) {
        area.innerHTML = '<p class="text-muted">Keine Szenarien vorhanden.</p>';
        return;
    }
    const allTags = new Set();
    szenarien.forEach(s => (s.tags || []).forEach(t => allTags.add(t)));
    const tagsArr = ['all', ...Array.from(allTags)];

    const filtered = szenarioFilterTag === 'all'
        ? szenarien
        : szenarien.filter(s => (s.tags || []).includes(szenarioFilterTag));

    const saved = loadSzenarioState();
    const resumeBtn = saved && saved.current != null && szenarien[saved.current] && saved.step < (saved.total || 99) ? `
        <button class="btn btn-danger text-start py-3 px-3" onclick="resumeSzenario()">
            <strong>Fortsetzen</strong><br><small>${saved.title} · Schritt ${saved.step + 1} / ${saved.total}</small>
        </button>
    ` : '';

    const tagFilters = tagsArr.map(t => `
        <button class="szenario-tag ${szenarioFilterTag === t ? 'active' : ''}" onclick="setSzenarioFilter('${t}')">${t === 'all' ? 'Alle' : (SZENARIO_TAGS[t] || t)}</button>
    `).join('');

    const diffBadge = (s) => s.difficulty ? `<span class="szenario-diff szenario-diff-${s.difficulty}">${SZENARIO_DIFFICULTY[s.difficulty] || s.difficulty}</span>` : '';

    area.innerHTML = `
        <h5 class="mb-3">Szenario wählen</h5>
        <div class="szenario-filters">${tagFilters}</div>
        <div class="d-grid gap-2 mt-3">
            ${resumeBtn}
            <button class="btn btn-danger text-start py-3 px-3" onclick="startRandomSzenario()">
                <strong>Zufällig</strong><br><small>Ein zufälliges Szenario starten ${szenarioFilterTag !== 'all' ? '(aus Filter)' : ''}</small>
            </button>
            ${filtered.length === 0 ? '<p class="text-muted small">Keine Szenarien für diesen Filter.</p>' : ''}
            ${filtered.map(s => {
                const i = szenarien.indexOf(s);
                return `
                    <button class="btn btn-outline-danger text-start py-3 px-3" onclick="startSzenario(${i})">
                        <div class="d-flex justify-content-between align-items-start gap-2">
                            <div class="flex-grow-1">
                                <strong>${s.title}</strong><br><small class="text-muted">${s.beschreibung}</small>
                            </div>
                            ${diffBadge(s)}
                        </div>
                    </button>
                `;
            }).join('')}
        </div>
    `;
}

function setSzenarioFilter(tag) {
    szenarioFilterTag = tag;
    startSzenarioMenu();
}

function startRandomSzenario() {
    if (!szenarien || !szenarien.length) return;
    const pool = szenarioFilterTag === 'all'
        ? szenarien
        : szenarien.filter(s => (s.tags || []).includes(szenarioFilterTag));
    if (!pool.length) return;
    const idx = szenarien.indexOf(pool[Math.floor(Math.random() * pool.length)]);
    startSzenario(idx);
}

function startSzenario(index) {
    szenarioCurrent = index;
    szenarioStep = 0;
    szenarioScore = 0;
    szenarioAnswered = false;
    if (szenarien[index]) setHeroTitle(szenarien[index].title, 'ueben-hero-title');
    saveSzenarioState();
    renderSzenario();
}

function renderSzenario() {
    const area = document.getElementById('szenario-area');
    const sz = szenarien[szenarioCurrent];
    const total = sz.schritte.length;

    if (szenarioStep >= total) {
        clearSzenarioState();
        const pct = Math.round((szenarioScore / total) * 100);
        const sc = pct >= 80 ? 'train-score-good' : pct >= 50 ? 'train-score-ok' : 'train-score-bad';
        area.innerHTML = `
            <div class="card shadow-sm"><div class="card-body text-center p-3">
                <h5>${sz.title}</h5>
                <p class="display-5 fw-bold ${sc}">${szenarioScore} / ${total}</p>
                <p class="text-muted small">${pct >= 80 ? 'Sehr gut!' : pct >= 50 ? 'Gut, aber noch Luft nach oben.' : 'Weiter üben!'}</p>
                <div class="mb-3">
                    <button type="button" class="uebergabe-trigger" onclick="openUebergabeModal()">Jetzt Übergabe formulieren</button>
                </div>
                <div class="d-flex justify-content-center gap-2">
                    <button class="btn btn-outline-secondary btn-sm" onclick="startSzenarioMenu()">Andere Szenarien</button>
                    <button class="btn btn-danger btn-sm" onclick="startSzenario(${szenarioCurrent})">Nochmal</button>
                </div>
            </div></div>`;
        return;
    }

    const step = sz.schritte[szenarioStep];
    area.innerHTML = `
        <div class="card shadow-sm"><div class="card-body p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="small fw-bold">${sz.title}</span>
                <span class="text-muted small">Schritt ${szenarioStep + 1} / ${total}</span>
            </div>
            <div class="progress mb-3" style="height:4px">
                <div class="progress-bar bg-danger" style="width:${(szenarioStep / total) * 100}%"></div>
            </div>
            <p class="small mb-2" style="background:#f8f9fa;padding:.6rem;border-radius:.4rem;border-left:3px solid #6c757d"><em>${step.situation}</em></p>
            <p class="fw-bold small mb-3">${step.frage}</p>
            <div class="d-grid gap-2">
                ${step.optionen.map((o, i) => `<button class="btn btn-outline-secondary text-start quiz-option py-2 px-3" id="sz-opt-${i}" onclick="answerSzenario(${i})">${o}</button>`).join('')}
            </div>
            <div id="sz-feedback" class="mt-3 d-none"></div>
            <div id="sz-next" class="mt-3 d-none text-end">
                <button class="btn btn-danger btn-sm" onclick="nextSzenarioStep()">Weiter</button>
            </div>
        </div></div>`;
}

function answerSzenario(i) {
    if (szenarioAnswered) return;
    szenarioAnswered = true;
    const step = szenarien[szenarioCurrent].schritte[szenarioStep];
    const ok = i === step.korrekt;
    if (ok) szenarioScore++;

    step.optionen.forEach((_, j) => {
        const el = document.getElementById(`sz-opt-${j}`);
        if (j === step.korrekt) el.classList.add('quiz-correct');
        if (j === i && !ok) el.classList.add('quiz-wrong');
        el.disabled = true;
    });

    const fb = document.getElementById('sz-feedback');
    fb.classList.remove('d-none');
    fb.innerHTML = (ok ? '<span class="text-success fw-bold small">Richtig!</span>' : '<span class="text-danger fw-bold small">Falsch.</span>') +
        `<p class="text-muted small mt-2 mb-0">${step.erklaerung}</p>`;
    document.getElementById('sz-next').classList.remove('d-none');
    saveSzenarioState();
}

function nextSzenarioStep() {
    szenarioStep++;
    szenarioAnswered = false;
    saveSzenarioState();
    renderSzenario();
}

// ===================== INIT =====================
async function ensureDataAndRender(dataKey, containerId, renderFn) {
    if (!DATA_CACHE[dataKey]) {
        const el = document.getElementById(containerId);
        if (el) el.innerHTML = '<div class="loading-placeholder"></div><div class="loading-placeholder"></div>';
        await loadData(dataKey);
    }
    renderFn();
}

function setHeroTitle(text, id) {
    const el = document.getElementById(id || 'hero-title');
    if (!el) return;
    el.innerHTML = text + '<span class="hero-dot">.</span>';
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
}

async function showUebenSection(section, btn) {
    document.querySelectorAll('#ueben .sub-pill').forEach(b => b.classList.remove('active'));
    const targetBtn = btn || document.querySelector('#ueben .sub-pill[data-section="' + section + '"]');
    if (targetBtn) targetBtn.classList.add('active');
    const titles = { quiz: 'Quiz', szenario: 'Szenario' };
    setHeroTitle(titles[section] || 'Üben', 'ueben-hero-title');
    const qPane = document.getElementById('ueben-quiz');
    const sPane = document.getElementById('ueben-szenario');
    if (qPane) qPane.classList.toggle('d-none', section !== 'quiz');
    if (sPane) sPane.classList.toggle('d-none', section !== 'szenario');
    if (section === 'quiz') {
        showQuizMenu();
    } else if (section === 'szenario') {
        if (!DATA_CACHE['szenarien']) await loadData('szenarien');
        startSzenarioMenu();
    }
}

let uebergabeModalInstance = null;
async function openUebergabeModal() {
    if (!DATA_CACHE['uebergabe']) await loadData('uebergabe');
    renderUebergabe();
    if (!uebergabeModalInstance) {
        uebergabeModalInstance = new bootstrap.Modal(document.getElementById('uebergabe-modal'));
    }
    uebergabeModalInstance.show();
}

function setupThemeToggle() {
    const btn = document.getElementById('theme-toggle');
    const meta = document.getElementById('theme-color-meta');
    if (!btn) return;
    btn.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        if (meta) meta.setAttribute('content', next === 'dark' ? '#1A1F2A' : '#F5F1E8');
        try { localStorage.setItem('sani-theme', next); } catch (e) {}
    });
}

(async () => {
    setupThemeToggle();
    showQuizMenu();
    await showWissenSection('xabcde', null);
    document.querySelectorAll('[data-bs-toggle="pill"]').forEach(t => {
        t.addEventListener('shown.bs.tab', e => {
            const target = e.target.getAttribute('data-bs-target');
            if (target === '#wissen') {
                const activeSub = document.querySelector('#wissen .sub-pill.active');
                const section = activeSub ? activeSub.dataset.section : 'xabcde';
                showWissenSection(section, activeSub);
            } else if (target === '#ueben') {
                const activeSub = document.querySelector('#ueben .sub-pill.active');
                const section = activeSub ? activeSub.dataset.section : 'quiz';
                showUebenSection(section, activeSub);
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });
})();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    });
}
</script>
